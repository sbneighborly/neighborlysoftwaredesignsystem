name: Design System CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  html-validation:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g vnu-jar
      - run: vnu --errors-only --skip-non-html index.html

  accessibility:
    name: Accessibility Audit (axe-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx serve . -p 3000 & sleep 3
      - run: node .github/scripts/axe-audit.js

  token-validation:
    name: Token Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node .github/scripts/validate-tokens.js
